name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build release package
        run: |
          ./tools/build_package.sh

      - name: Install wheel
        run: |
          pip install bindings/python/dist/*.whl

      - name: Verify import
        run: |
          python -c "from macstt import STT; print(STT)"

      - name: Smoke test
        run: |
          python - <<'PY'
from macstt import STT

with STT():
    print("Helper launched successfully.")
PY

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: macstt-wheel
          path: bindings/python/dist/*