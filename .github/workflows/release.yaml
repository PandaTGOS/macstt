name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write


jobs:
  build-release:
    runs-on: macos-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build wheel

      - name: Build package
        run: |
          chmod +x tools/build_helper.sh
          chmod +x tools/build_package.sh
          ./tools/build_package.sh

      - name: Inspect helper binary
        run: |
          echo "=== Helper ==="
          file bindings/python/macstt/bin/macstt-helper

      - name: Inspect wheel metadata
        run: |
          echo "=== Wheel ==="
          ls -l bindings/python/dist
          python -m wheel tags bindings/python/dist/*.whl

      - name: Verify wheel
        run: |
          python -m wheel tags bindings/python/dist/*.whl

          WHEEL=$(find bindings/python/dist -name "*.whl")

          echo "Built wheel:"
          basename "$WHEEL"

          if [[ "$WHEEL" == *"-any.whl" ]]; then
            echo "ERROR: Platform wheel expected."
            exit 1
          fi

      - name: Smoke test wheel
        run: |
          python -m venv testenv
          source testenv/bin/activate
          pip install bindings/python/dist/*.whl
          python -c "from macstt import STT; print('Import successful')"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bindings/python/dist/*.whl
            bindings/python/dist/*.tar.gz

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: bindings/python/dist/*

  publish-pypi:
    needs: build-release
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/